        /* ── Variables ── */
        :root {
            --bg:      #faf9f6;

        a { text-decoration: none; color: inherit; }

        .home-header {

        .home-header h1 em {

            color: var(--accent);
        }

        .home-header .tagline {
            font-family: var(--ff-b);
            font-size: clamp(0.82rem, 1.2vw, 0.95rem);
            font-weight: 300;
            letter-spacing: 0.14em;
            text-transform: uppercase;
            color: var(--soft);
        }

        /* ── Grid de cards ── */
        .cards-wrap {
            flex: 1;
            padding: 0 clamp(16px, 3vw, 40px) clamp(16px, 3vw, 32px);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 14px;
            height: clamp(300px, 50vw, 540px);
        }

        .card {
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            background: #e5e2de;
            display: block;
            height: 100%;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            filter: brightness(0.87) saturate(0.82);
            transition: transform 0.55s var(--ease), filter 0.55s var(--ease);
        }

        .card:hover img {
            transform: scale(1.04);
            filter: brightness(0.76) saturate(0.9);
        }

        /* degradado inferior */
        .card::after {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.52) 0%, transparent 50%);
            pointer-events: none;
        }

        .card-body {
            position: absolute;
            bottom: 22px;
            left: 22px;
            z-index: 2;
            color: var(--white);
        }

        .card-eyebrow {
            display: block;
            font-family: var(--ff-b);
            font-size: 0.62rem;
            font-weight: 400;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            opacity: 0.72;
            margin-bottom: 3px;
        }

        .card-title {
            display: block;
            font-family: var(--ff-d);
            font-size: clamp(1.1rem, 1.8vw, 1.5rem);
            font-weight: 400;
        }

        /* ── Footer umbral ── */
        .home-footer {
            padding: clamp(20px, 3vw, 36px) clamp(24px, 5vw, 60px);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
            border-top: 1px solid var(--border);
        }

        .home-footer p {
            font-size: 0.78rem;
            color: var(--soft);
            letter-spacing: 0.04em;
        }

        .home-footer nav {
            display: flex;
            gap: 20px;
        }

        .home-footer nav a {
            font-family: var(--ff-b);
            font-size: 0.72rem;
            font-weight: 400;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            color: var(--soft);
            transition: color 0.3s;
        }

        .home-footer nav a:hover { color: var(--accent); }

        /* ── Responsive ── */
        @media (max-width: 640px) {
            .grid {
                grid-template-columns: 1fr;
                height: auto;
            }
            .card { height: 220px; }
            .home-footer { justify-content: center; text-align: center; }
        }

        @media (prefers-reduced-motion: reduce) {
            .card img { transition: none; }
        }
